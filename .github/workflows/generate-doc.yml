name: Generate PRD Document

on:
  push:
    branches: [main]
    paths:
      - 'generate-doc.js'
      - 'package.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate document
        run: node generate-doc.js

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wordie-Resource-Planner-PRD
          path: Wordie-Resource-Planner-PRD.docx
          retention-days: 90

      - name: Commit updated document
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Wordie-Resource-Planner-PRD.docx
          git diff --cached --quiet || git commit -m "chore: regenerate PRD document [skip ci]"
          git push
